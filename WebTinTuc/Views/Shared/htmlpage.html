<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trường THPT Nguyễn Du - @ViewData["Title"]</title>
    <link rel="stylesheet" href="~/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="~/css/site.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
    <header class="py-3 border-bottom-red">
        <div class="container d-flex align-items-center">
            <img src="~/images/logo-nguyendu.png" alt="Logo" height="80" />
            <div class="ms-3">
                <h6 class="text-uppercase mb-0 text-primary">Sở Giáo dục và Đào tạo TP. Hồ Chí Minh</h6>
                <h4 class="text-uppercase fw-bold text-danger">Trường THPT Nguyễn Du</h4>
            </div>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-school-blue sticky-top">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav w-100 justify-content-between">
                    <li class="nav-item"><a class="nav-link active" href="/"><i class="fa fa-home"></i></a></li>
                    <li class="nav-item"><a class="nav-link" href="#">GIỚI THIỆU</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">TIN TỨC</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">TUYỂN SINH</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">VĂN BẢN</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">ĐOÀN THỂ</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">VIDEO</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <main role="main" class="pb-3">
            @RenderBody()
        </main>
    </div>

    <footer class="bg-school-blue text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 - Trường THPT Nguyễn Du - Thiết kế bởi Trà Quang Vinh</p>
        </div>
    </footer>

    <script src="~/lib/jquery/dist/jquery.min.js"></script>
    <script src="~/lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
